<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcards de Mitos e Verdades</title>
<link rel="stylesheet" href="style.css"><!--chamar a folha de estilo css-->
</head>

<body>
<!--cabeçalho-->
<header class="cabecalho"><!--inserir a classe na div-->
<h1>Confere Aí</h1>
<nav>
<a href="#">Início</a>
</nav>
</header>
<!--area principal-->
<main class="cartao"><!--inserir a classe na div-->
<h2>Descubra a verdade passando o mouse</h2>
<section>
<article>
<div class="cartao-interno"><!--inserir a classe na div-->
<div class="cartao-frente"><!--inserir a classe na div-->
<!--noticia falsa-->
<img

src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQU0lavBd3_n_a7iaDIj8rmMCqc56rO3e3TuIMSn8QYFoKrUn4-OE_XGSM&s=10"

<p>Pinguins conseguem voar como pássaros!</p>
</div>
<div class="cartao-verso"><!--inserir a classe na div-->
<!--noticia verdadeira-->
<img

src="https://upload.wikimedia.org/wikipedia/commons/5/56/00_2103_Pinguin_-
_Petermann_Island_%28Antarktische_Halbinsel%29.jpg"

alt="Pinguim" class="cartao-imagem"><!--inserir a classe na img-->
<p>Pinguins não voam, mas são excelentes nadadores.</p>
</div>
</div>
</article>
</section>
</main>
<footer class="rodape"><!--inserir a classe na div-->

</footer>
